services:
  doki-db:
    image: postgres:16
    container_name: doki-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: doki-db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  doki-db-test:
    image: postgres:16
    container_name: doki-db-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: doki-db-test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: doki
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      DB_HOST: db
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
    depends_on:
      doki-db:
        condition: service_healthy

volumes:
  pgdata:
